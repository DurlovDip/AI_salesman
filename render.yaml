services:
  - type: web
    name: ai-salesman
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: FASHION_ARC_API_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STORE_NAME
        sync: false
      - key: STORE_URL
        sync: false
      - key: STORE_CURRENCY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: MAX_HISTORY_MESSAGES
        value: "20"
